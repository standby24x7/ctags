name: C/C++ CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: install tools and libraries
      run: sudo apt-get install valgrind pkg-config automake bash
    - name: autogen.sh
      run: ./autogen.sh
    - name: configure
      run: ./configure --enable-debugging
    - name: make
      run: make
    - name: make units
      run: make units VG=1
    - name: make distcheck
      run: make distcheck
